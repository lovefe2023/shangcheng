version: '3.8'

services:
  # ===========================================
  # 应用服务
  # ===========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wine-mall-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/server/uploads
    networks:
      - wine-mall-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Nginx 反向代理
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: wine-mall-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - wine-mall-network

networks:
  wine-mall-network:
    driver: bridge